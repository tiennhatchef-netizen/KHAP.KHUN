<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍜 KhạpKhun — Hệ Thống Quản Lý</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal2:#158a63;--amber:#C47D10;--red:#B03030;--blue:#1A5FAB;
  --bg:#F0EDE8;--white:#ffffff;--border:#D8D4CC;--border2:#1a1a18;
  --text1:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;
  --green:#1D9E75;--orange:#E07B20;--purple:#6B3FA0;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;font-size:13px}

/* NAV */
.nav{display:flex;align-items:center;gap:2px;padding:8px 14px;border-bottom:2px solid var(--border2);background:var(--white);flex-wrap:wrap;position:sticky;top:0;z-index:200}
.logo{font-size:15px;font-weight:700;margin-right:8px;letter-spacing:-0.5px;white-space:nowrap}.logo span{color:var(--teal)}
.ver{font-size:10px;font-weight:700;background:var(--border2);color:#fff;padding:2px 7px;margin-right:8px}
.nb{padding:6px 11px;border:2px solid transparent;background:transparent;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:.1s;white-space:nowrap;color:var(--text2)}
.nb:hover{border-color:var(--border2);color:var(--text1)}.nb.on{background:var(--border2);color:#fff;border-color:var(--border2)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.save-btn{padding:6px 14px;background:var(--teal);color:#fff;border:2px solid var(--teal2);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.save-btn:hover{background:var(--teal2)}
.saved-msg{font-size:11px;color:var(--teal);font-weight:700;opacity:0;transition:.4s}.saved-msg.show{opacity:1}
.ts{font-size:10px;color:var(--text3);padding:3px 8px;border:1px solid var(--border)}

/* LAYOUT */
.content{max-width:1380px;margin:0 auto;padding:16px 18px;width:100%}
.page{display:none}.page.on{display:block}

/* CARDS */
.card{background:var(--white);border:2px solid var(--border2);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--white);border:2px solid var(--border2);padding:12px 14px}
.metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1.1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}
.m-good .metric-val{color:var(--teal)}.m-warn .metric-val{color:var(--amber)}.m-bad .metric-val{color:var(--red)}.m-blue .metric-val{color:var(--blue)}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:middle}
tr:hover td{background:#F7F4F0}
.tr-total td{background:#F0EDE8;font-weight:700;border-top:2px solid var(--border2)}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.3px;border:1.5px solid;border-radius:1px}
.b-green{color:var(--teal);border-color:var(--teal);background:#e8f8f2}
.b-red{color:var(--red);border-color:var(--red);background:#fdf0f0}
.b-amber{color:var(--amber);border-color:var(--amber);background:#fdf5e6}
.b-blue{color:var(--blue);border-color:var(--blue);background:#e8f0fb}
.b-gray{color:var(--text2);border-color:var(--border);background:#f5f5f3}

/* FORMS */
.form-grid{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
input,select,textarea{padding:7px 10px;border:1.5px solid var(--border);background:var(--white);font-family:inherit;font-size:13px;color:var(--text1);transition:.1s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--border2)}
input[type=number]{font-family:'IBM Plex Mono',monospace}
.btn{padding:7px 16px;border:2px solid;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--border2);color:#fff;border-color:var(--border2)}.btn-primary:hover{opacity:.85}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal2)}.btn-teal:hover{background:var(--teal2)}
.btn-red{background:var(--red);color:#fff;border-color:#8a2020}.btn-red:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text1);border-color:var(--border2)}.btn-outline:hover{background:var(--border2);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}

/* PROGRESS BAR */
.pbar-wrap{height:6px;background:var(--bg);border:1px solid var(--border);overflow:hidden}
.pbar{height:100%;transition:.4s}
.pb-teal{background:var(--teal)}.pb-amber{background:var(--amber)}.pb-red{background:var(--red)}

/* TAGS */
.tag-rau{background:#e8f8f2;color:#156347;border-radius:2px;padding:1px 6px;font-size:10px;font-weight:700}
.tag-btp{background:#fff3e0;color:#9a4f10;border-radius:2px;padding:1px 6px;font-size:10px;font-weight:700}
.tag-thit{background:#fce4ec;color:#7a1a35;border-radius:2px;padding:1px 6px;font-size:10px;font-weight:700}
.tag-kho{background:#e3f2fd;color:#1a3f7a;border-radius:2px;padding:1px 6px;font-size:10px;font-weight:700}
.tag-gia{background:#f3e5f5;color:#4a1a7a;border-radius:2px;padding:1px 6px;font-size:10px;font-weight:700}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border:2px solid var(--border2);padding:20px;min-width:380px;max-width:780px;width:95%;max-height:90vh;overflow-y:auto;position:relative}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border2)}
.modal-title{font-size:14px;font-weight:700}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);line-height:1}
.modal-close:hover{color:var(--red)}

/* ALERT */
.alert{padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:8px;border-left:3px solid}
.alert-warn{background:#fffbec;border-color:var(--amber);color:#7a4f00}
.alert-danger{background:#fff0f0;border-color:var(--red);color:#7a0000}
.alert-success{background:#edfaf4;border-color:var(--teal);color:#0a4a30}

/* GRID HELPERS */
.row{display:flex;gap:12px}.row>*{flex:1}
.col-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* CALENDAR GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px;text-transform:uppercase}
.cal-day{border:1.5px solid var(--border);padding:4px;min-height:44px;cursor:pointer;font-size:11px;font-weight:600;transition:.1s;position:relative}
.cal-day:hover{border-color:var(--border2)}
.cal-day.filled{background:#edfaf4;border-color:var(--teal)}
.cal-day.today{border-color:var(--amber);border-width:2px}
.cal-day.weekend{background:#fafaf8}
.cal-day .day-num{font-size:10px;font-weight:700;color:var(--text3)}
.cal-day .day-val{font-size:12px;font-weight:700;color:var(--teal);font-family:'IBM Plex Mono',monospace}
.cal-day.no-day{background:var(--bg);border-color:transparent;cursor:default}

/* CHART BARS */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:80px;padding:4px 0}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-bar{width:100%;background:var(--teal);transition:.5s;min-height:2px;max-height:72px}
.chart-bar-label{font-size:9px;color:var(--text3);font-weight:600}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* UTIL */
.mono{font-family:'IBM Plex Mono',monospace}.txt-right{text-align:right}.txt-center{text-align:center}
.txt-green{color:var(--teal)}.txt-blue{color:var(--blue)}.txt-red{color:var(--red)}.txt-amber{color:var(--amber)}.txt-gray{color:var(--text3)}
.fw700{font-weight:700}.fs11{font-size:11px}.fs10{font-size:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.flex{display:flex}.flex-center{display:flex;align-items:center;gap:8px}.gap8{gap:8px}
.hidden{display:none}
.input-inline{width:70px;padding:3px 6px;border:1.5px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right}
.input-inline:focus{outline:none;border-color:var(--border2)}
.sticky-col{position:sticky;left:0;background:var(--white);z-index:1}
tr:hover .sticky-col{background:#F7F4F0}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

@media(max-width:768px){
  .nav{padding:6px 8px;gap:1px}
  .nb{padding:5px 8px;font-size:10px}
  .content{padding:10px}
  .col-2,.col-3{grid-template-columns:1fr}
  .fg4{grid-template-columns:1fr 1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.login-overlay.hidden{display:none}
.login-box{background:var(--white);border:2px solid var(--border2);padding:32px 28px;width:340px;max-width:92vw}
.login-logo{font-size:22px;font-weight:700;text-align:center;margin-bottom:2px}
.login-logo span{color:var(--teal)}
.login-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:18px}
.login-error{background:#fff0f0;border-left:3px solid var(--red);color:#7a0000;font-size:12px;font-weight:600;padding:8px 10px;margin-bottom:10px}
#app-root.hidden{display:none}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:4px}
.sync-dot.off{background:var(--red)}
.user-chip{font-size:11px;font-weight:700;color:var(--text2);padding:3px 8px;border:1px solid var(--border)}
</style>
</head>
<body>
<script src="/socket.io/socket.io.js"></script>
<!-- FIX: Thêm script sync modules -->
<script src="/app-sync.js"></script>
<script src="/app-core.js"></script>
<script src="/init-socket.js"></script>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">🍜 <span>Khạp</span>Khun</div>
    <div class="login-sub">Đăng nhập để vào hệ thống</div>
    <div id="login-error" class="login-error hidden"></div>
    <div class="form-group">
      <label>Tài khoản</label>
      <input id="login-username" type="text" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    </div>
    <div class="form-group" style="margin-top:8px">
      <label>Mật khẩu</label>
      <input id="login-password" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:14px" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div id="app-root" class="hidden">

<!-- NAV -->
<nav class="nav">
  <span class="logo">🍜 <span>Khạp</span>Khun</span>
  <span class="ver">v13</span>
  <button class="nb on" onclick="goPage('dashboard')">📊 Dashboard</button>
  <button class="nb" onclick="goPage('banhang')">🛒 Bán Hàng</button>
  <button class="nb" onclick="goPage('nvl')">📦 Danh Mục NVL</button>
  <button class="nb" onclick="goPage('inventory')">🚚 Nhập Hàng</button>
  <button class="nb" onclick="goPage('menu')">🍽 Menu & Công Thức</button>
  <button class="nb" onclick="goPage('bantaicho')" style="border-color:var(--orange);color:var(--orange)">🏠 Menu Tại Chỗ</button>
  <button class="nb" onclick="goPage('chamcong')">👥 Chấm Công</button>
  <button class="nb" onclick="goPage('chiphi')">💸 Chi Phí</button>
  <button class="nb" onclick="goPage('haohut')">📉 Hao Hụt</button>
  <button class="nb" onclick="goPage('huyhang')">🗑 Hủy Hàng</button>
  <button class="nb" onclick="goPage('tonkho')">🗄 Tồn Kho</button>
  <button class="nb" onclick="goPage('baocao')">📈 Báo Cáo</button>
  <button class="nb" onclick="goPage('dubaodoanhthu')" style="border-color:var(--teal);color:var(--teal)">📐 Dự Báo DT</button>
  <button class="nb hidden" id="nb-nguoidung" onclick="goPage('nguoidung')">👤 Người Dùng</button>
  <div class="nav-right">
    <span class="fs10 txt-gray"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Đã kết nối</span></span>
    <span class="saved-msg" id="savedMsg">✓ Đã lưu</span>
    <span class="ts" id="tsLabel">—</span>
    <button class="save-btn" onclick="saveData()">💾 Lưu</button>
    <span class="user-chip" id="userChip">—</span>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Đăng xuất</button>
  </div>
</nav>

<div class="content">
<!-- PAGES CONTENT - Keep the rest of the original HTML -->
</div>

</div>
</body>
</html>
